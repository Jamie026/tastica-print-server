name: Build Tastica Print Agent

on:
    push:
        branches: [main, master]
    workflow_dispatch:

jobs:
    build-windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm install

            - name: Build Windows
              run: npm run dist:win -- --publish never

            - name: Upload .exe
              uses: actions/upload-artifact@v4
              with:
                  name: windows-exe
                  path: dist/*.exe

    build-mac:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm install

            - name: Build Mac
              run: npm run dist:mac -- --publish never

            - name: Upload .dmg
              uses: actions/upload-artifact@v4
              with:
                  name: mac-dmg
                  path: dist/*.dmg

    build-linux:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm install

            - name: Build Linux
              run: npm run dist:linux -- --publish never

            - name: Dar permisos y empaquetar
              run: |
                  chmod +x dist/*.AppImage
                  cd dist
                  tar -czf TasticaPrintAgent-linux.tar.gz *.AppImage

            - name: Upload .tar.gz
              uses: actions/upload-artifact@v4
              with:
                  name: linux-appimage
                  path: dist/TasticaPrintAgent-linux.tar.gz
